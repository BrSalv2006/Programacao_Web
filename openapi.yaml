openapi: 3.2.0
info:
  title: GREENHERB API
  description: Plataforma Web de Gestão Inteligente de uma Estufa
  version: 1.0.0

servers:
  - url: http://localhost:3000/api

tags:
  - name: Auth
  - name: System
  - name: Ervas Aromáticas
  - name: Planos de Cultivo
  - name: Lotes de Cultivo
  - name: Tarefas Operacionais
  - name: Monitorização
  - name: Admin

paths:
  /health:
    get:
      tags:
        - System
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  uptime:
                    type: number
                  db:
                    type: string

  /auth/me:
    get:
      tags:
        - Auth
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UserPublic"
        "401":
          description: Unauthorized

  /auth/register:
    post:
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRegister"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/UserPublic"
        "400":
          description: Bad Request
        "409":
          description: Conflict

  /auth/login:
    post:
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserLogin"
      responses:
        "200":
          description: OK
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Cookies access e refresh
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          description: Unauthorized

  /auth/refresh:
    post:
      tags:
        - Auth
      responses:
        "200":
          description: OK
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Cookies access e refresh
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          description: Unauthorized

  /auth/logout:
    post:
      tags:
        - Auth
      responses:
        "200":
          description: OK
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Limpeza de cookies access e refresh
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/password/request:
    post:
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/password/reset:
    post:
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordReset"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Bad Request

  /ervas:
    get:
      tags:
        - Ervas Aromáticas
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: all
          in: query
          schema:
            type: string
          description: "'true' para incluir inativas"
        - name: view
          in: query
          schema:
            type: string
            enum: [select, planos]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/ErvaAromatica"
    post:
      tags:
        - Ervas Aromáticas
      security:
        - cookieAuth: []
        - bearerAuth: []
      description: Requer role Administrador ou Responsável
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErvaAromaticaInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ErvaAromatica"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /ervas/importar:
    post:
      tags:
        - Ervas Aromáticas
      security:
        - cookieAuth: []
        - bearerAuth: []
      description: Requer role Administrador ou Responsável
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Ficheiro CSV com Ervas a importar
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "207":
          description: Multi-Status (Erros parciais)
        "400":
          description: Bad Request

  /ervas/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      tags:
        - Ervas Aromáticas
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
