                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/ErvaAromatica"
        "404":
          description: Not Found
    patch:
      tags:
        - Ervas Aromáticas
      security:
        - cookieAuth: []
        - bearerAuth: []
      description: Requer role Administrador ou Responsável
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErvaAromaticaInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
