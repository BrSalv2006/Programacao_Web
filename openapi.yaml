components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: access
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          nullable: true
      required: [success]

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        details:
          nullable: true
      required: [success, message]

    UserPublic:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [Pendente, Técnico, Responsável, Administrador]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UserRegister:
      type: object
      required: [name, email, password, confirmPassword]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
        confirmPassword:
          type: string

    UserLogin:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    UserRoleUpdate:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [Pendente, Técnico, Responsável, Administrador]

    PasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    PasswordReset:
      type: object
      required: [email, token, newPassword]
      properties:
        email:
          type: string
          format: email
        token:
          type: string
        newPassword:
          type: string

    ErvaAromaticaInput:
      type: object
      required: [nome, nomeCientifico, variedade, familia, cicloDiasFim]
      properties:
        nome:
          type: string
        nomeCientifico:
          type: string
        variedade:
          type: string
        familia:
          type: string
        cicloDiasFim:
          type: number
        descricao:
          type: string
        condicoesIdeais:
          type: object
          properties:
            temperaturaMin:
              type: number
            temperaturaMax:
              type: number
            humidadeMin:
              type: number
            humidadeMax:
              type: number
            luminosidadeMin:
              type: number
            luminosidadeMax:
              type: number
        ativo:
