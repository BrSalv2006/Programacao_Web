<!DOCTYPE html>
<html lang="pt-PT">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Recuperar Palavra-passe - GREENHERB</title>
		<link rel="icon" href="/img/favicon.ico" type="image/x-icon">
		<link rel="stylesheet" href="/css/global.css">
	</head>
	<body>
		<main class="auth-container">
			<div class="card auth-card">
				<div class="brand-header">
					<img src="/img/logo.png" alt="GREENHERB Logo" class="brand-logo" onerror="this.style.display=' none'">
					<h1 class="text-xl text-black color-dark">GREENHERB</h1>
					<p class="text-sm color-muted">Gestão Inteligente de Estufa</p>
				</div>
				<form id="request-form" novalidate>
					<div class="input-group">
						<label for="email">E-mail</label>
						<input type="email" id="email" name="email" class="form-control" required autocomplete="email" placeholder="tecnico@greenherb.pt">
					</div>
					<div id="alert" class="alert"></div>
					<div class="form-actions">
						<button type="submit" id="submit-btn" class="btn btn-primary w-full">Recuperar Palavra-passe</button>
						<button type="button" id="login-btn" class="btn btn-secondary w-full">Iniciar Sessão</button>
					</div>
				</form>
			</div>
		</main>
		<script type="module" src="/js/service-worker-register.js"></script>
		<script type="module" src="./request.js"></script>
	</body>
</html>
