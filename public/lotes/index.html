<!DOCTYPE html>
<html lang="pt-PT">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>GREENHERB - Gestão de Lotes</title>
		<link rel="stylesheet" href="/shared/style.css">
		<link rel="stylesheet" href="lotes.css">
		<script src="/shared/auth.js"></script>
		<script src="/shared/components.js" defer></script>
	</head>
	<body>
		<app-header title="Gestão de Lotes"></app-header>
		<main>
			<section id="form-lote">
				<h2>Registo de Novo Lote</h2>
				<form id="loteForm">
					<div class="input-group">
						<label for="planoAssociado">Plano de Cultivo Associado:</label>
						<select id="planoAssociado" required>
							<option value="" disabled selected>A carregar planos...</option>
						</select>
					</div>
					<div class="input-group">
						<label for="dataInicio">Data de Início Real:</label>
						<input type="date" id="dataInicio" required>
					</div>
					<div class="input-group">
						<label for="quantidadeInicial">Quantidade/Área Inicial (ex: 500 vasos ou 50m²):</label>
						<input type="text" id="quantidadeInicial" required placeholder="Ex: 500 vasos">
					</div>
					<button type="submit">Iniciar Lote</button>
				</form>
			</section>
			<section id="listagem">
				<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;">
					<h2 style="margin-bottom: 0;">Monitorização de Lotes</h2>
					<button id="btnExportarLotes" class="btn-export">📥 Exportar para CSV</button>
				</div>
				<div id="listaLotes">
					<p>Ainda não existem lotes registados.</p>
				</div>
			</section>
		</main>
		<app-footer></app-footer>
		<script src="/shared/database.js" defer></script>
		<script src="lotes.js" defer></script>
		<script src="/shared/service-worker-register.js" defer></script>
	</body>
</html>
