<!DOCTYPE html>
<html lang="pt-PT">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Logs de Auditoria - GREENHERB</title>
		<link rel="icon" href="/img/favicon.ico" type="image/x-icon">
		<link rel="stylesheet" href="/css/global.css">
	</head>
	<body class="dashboard-layout">
		<aside class="sidebar card"></aside>
		<main class="main-content">
			<header class="topbar">
				<div>
					<h1 class="text-xl text-black color-dark">Registo de Atividades</h1>
					<p class="text-sm color-muted">Rastreabilidade completa de todas as ações no sistema.</p>
				</div>
				<div class="topbar-actions">
					<button id="export-btn" class="btn btn-secondary">Exportar CSV</button>
				</div>
			</header>
			<div class="filters-container card p-6 mb-4 grid-2">
				<div class="input-group">
					<label for="filter-acao">Filtrar por Ação</label>
					<input type="text" id="filter-acao" class="form-control" placeholder="Ex: CRIAR_TAREFA">
				</div>
				<div class="input-group">
					<label for="filter-entidade">Filtrar por Entidade</label>
					<select id="filter-entidade" class="form-control">
						<option value="">Todas</option>
						<option value="LoteCultivo">LoteCultivo</option>
						<option value="Tarefa">Tarefa</option>
						<option value="User">User</option>
						<option value="ErvaAromatica">ErvaAromatica</option>
						<option value="PlanoCultivo">PlanoCultivo</option>
						<option value="MedicaoAmbiental">MedicaoAmbiental</option>
						<option value="Alerta">Alerta</option>
					</select>
				</div>
			</div>
			<div class="table-container">
				<table class="table">
					<thead>
						<tr>
							<th>Data</th>
							<th>Utilizador</th>
							<th>Ação</th>
							<th>Entidade</th>
							<th>Resumo dos Detalhes</th>
						</tr>
					</thead>
					<tbody id="table-body">
						<tr>
							<td colspan="5" class="color-muted text-center">A carregar logs...</td>
						</tr>
					</tbody>
				</table>
			</div>
		</main>
		<script type="module" src="/js/service-worker-register.js"></script>
		<script type="module" src="/js/components/sidebar.js"></script>
		<script type="module" src="./logs.js"></script>
	</body>
</html>
