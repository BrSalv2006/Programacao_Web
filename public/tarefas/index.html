<!DOCTYPE html>
<html lang="pt-PT">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Tarefas - GREENHERB</title>
		<link rel="icon" href="/img/favicon.ico" type="image/x-icon">
		<link rel="stylesheet" href="/css/global.css">
	</head>
	<body class="dashboard-layout">
		<aside class="sidebar card"></aside>
		<main class="main-content">
			<header class="topbar">
				<div>
					<h1 class="text-xl text-black color-dark">Tarefas Operacionais</h1>
					<p class="text-sm color-muted">Gerir as intervenções a realizar nos lotes.</p>
				</div>
				<div class="topbar-actions">
					<button id="export-btn" class="btn btn-secondary">Exportar CSV</button>
					<button id="add-btn" class="btn btn-primary">+ Nova Tarefa</button>
				</div>
			</header>
			<div id="page-alert" class="alert mb-4"></div>
			<div class="table-container">
				<table class="table">
					<thead>
						<tr>
							<th>Tipo</th>
							<th>Lote ID</th>
							<th>Agendamento</th>
							<th>Estado</th>
							<th>Ações</th>
						</tr>
					</thead>
					<tbody id="table-body">
						<tr>
							<td colspan="5" class="color-muted text-center">A carregar dados...</td>
						</tr>
					</tbody>
				</table>
			</div>
		</main>
		<div id="modal" class="modal">
			<div class="card modal-card max-w-450">
				<div class="modal-header">
					<h2 class="text-lg text-bold color-dark">Agendar Nova Tarefa</h2>
					<button type="button" id="close-modal" class="close-btn">&times;</button>
				</div>
				<form id="modal-form">
					<div id="modal-alert" class="alert"></div>
					<div class="input-group">
						<label>Lote Alvo</label>
						<select id="loteId" class="form-control" required>
							<option value="">A carregar...</option>
						</select>
					</div>
					<div class="input-group">
						<label>Tipo de Tarefa</label>
						<select id="tipo" class="form-control" required>
							<option value="Rega">Rega</option>
							<option value="Fertilização">Fertilização</option>
							<option value="Colheita">Colheita</option>
							<option value="Monitorização">Monitorização</option>
						</select>
					</div>
					<div class="input-group">
						<label>Data Agendada</label>
						<input type="date" id="dataAgendada" class="form-control" required>
					</div>
					<div class="input-group">
						<label>Descrição (Opcional)</label>
						<textarea id="descricao" class="form-control" rows="2"></textarea>
					</div>
					<div class="form-actions">
						<button type="submit" class="btn btn-primary w-full">Criar Tarefa</button>
					</div>
				</form>
			</div>
		</div>
		<script type="module" src="/js/service-worker-register.js"></script>
		<script type="module" src="/js/components/sidebar.js"></script>
		<script type="module" src="tarefas.js"></script>
	</body>
</html>
