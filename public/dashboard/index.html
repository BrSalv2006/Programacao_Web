<!DOCTYPE html>
<html lang="pt-PT">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Dashboard - GREENHERB</title>
		<link rel="icon" href="/img/favicon.ico" type="image/x-icon">
		<link rel="stylesheet" href="/css/global.css">
		<link rel="stylesheet" href="./dashboard.css">
	</head>
	<body class="dashboard-layout">
		<aside class="sidebar card"></aside>
		<main class="main-content">
			<header class="topbar">
				<div>
					<h1 class="text-xl text-black color-dark">Bem-vindo(a) à Estufa</h1>
					<p class="text-sm color-muted">Aqui está o resumo atual das operações.</p>
				</div>
				<div class="topbar-actions">
					<div class="user-badge card">
						<div class="avatar" id="badge-avatar">?</div>
						<span class="text-sm text-bold color-dark" id="badge-role">Carregando...</span>
					</div>
				</div>
			</header>
			<section class="kpi-grid">
				<div class="card kpi-card">
					<div class="kpi-icon bg-info">
						<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--info-text)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
							<path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z" />
						</svg>
					</div>
					<div class="kpi-info">
						<h3 class="text-sm color-muted">Lotes Ativos</h3>
						<p class="text-xl text-black" id="count-lotes">-</p>
					</div>
				</div>
				<div class="card kpi-card">
					<div class="kpi-icon bg-warning">
						<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--warning-text)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
							<path d="M12 2v20" />
							<path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
						</svg>
					</div>
					<div class="kpi-info">
						<h3 class="text-sm color-muted">Tarefas Pendentes</h3>
						<p class="text-xl text-black" id="count-tarefas">-</p>
					</div>
				</div>
				<div class="card kpi-card">
					<div class="kpi-icon bg-danger">
						<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--danger-text)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
							<path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z" />
							<line x1="12" x2="12" y1="9" y2="13" />
							<line x1="12" x2="12.01" y1="17" y2="17" />
						</svg>
					</div>
					<div class="kpi-info">
						<h3 class="text-sm color-muted">Alertas Críticos</h3>
						<p class="text-xl text-black" id="count-alertas">-</p>
					</div>
				</div>
			</section>
			<section class="recent-section">
				<h2 class="text-lg text-bold color-dark">Alertas Recentes</h2>
				<div class="card mt-4 p-6">
					<ul class="alert-list" id="recent-alerts-list">
						<li class="color-muted text-sm">A carregar alertas...</li>
					</ul>
				</div>
			</section>
		</main>
		<script type="module" src="/js/service-worker-register.js"></script>
		<script type="module" src="/js/components/sidebar.js"></script>
		<script type="module" src="./dashboard.js"></script>
	</body>
</html>
