<!DOCTYPE html>
<html lang="pt-PT">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Iniciar Sessão - GREENHERB</title>
		<link rel="icon" href="/img/favicon.ico" type="image/x-icon">
		<link rel="stylesheet" href="/css/global.css">
	</head>
	<body>
		<main class="auth-container">
			<div class="card auth-card">
				<div class="brand-header">
					<img src="/img/logo.png" alt="GREENHERB Logo" class="brand-logo" onerror="this.style.display='none'">
					<h1 class="text-xl text-black color-dark">GREENHERB</h1>
					<p class="text-sm color-muted">Gestão Inteligente de Estufa</p>
				</div>
				<form id="login-form" novalidate>
					<div class="input-group">
						<label for="email">E-mail</label>
						<input type="email" id="email" name="email" class="form-control" required autocomplete="email" placeholder="tecnico@greenherb.pt">
					</div>
					<div class="input-group">
						<label for="password">Palavra-passe</label>
						<div class="password-wrapper">
							<input type="password" id="password" name="password" class="form-control" required autocomplete="current-password" placeholder="••••••••">
							<button type="button" class="toggle-password-btn" title="Mostrar/Ocultar palavra-passe">
								<img src="/img/eyeOn.svg" width="20" height="20" alt="Mostrar/Ocultar">
							</button>
						</div>
					</div>
					<div id="alert" class="alert"></div>
					<div class="form-actions">
						<button type="submit" id="submit-btn" class="btn btn-primary w-full">Iniciar Sessão</button>
						<button type="button" id="register-btn" class="btn btn-secondary w-full">Criar Conta</button>
						<button type="button" id="recover-btn" class="btn btn-tertiary w-full">Recuperar palavra-passe</button>
					</div>
				</form>
			</div>
		</main>
		<script type="module" src="/js/service-worker-register.js"></script>
		<script type="module" src="./login.js"></script>
	</body>
</html>
