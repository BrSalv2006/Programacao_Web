<!DOCTYPE html>
<html lang="pt-PT">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Alertas - GREENHERB</title>
		<link rel="icon" href="/img/favicon.ico" type="image/x-icon">
		<link rel="stylesheet" href="/css/global.css">
	</head>
	<body class="dashboard-layout">
		<aside class="sidebar card"></aside>
		<main class="main-content">
			<header class="topbar">
				<div>
					<h1 class="text-xl text-black color-dark">Sistema de Alertas</h1>
					<p class="text-sm color-muted">Analise e resolva discrepâncias detetadas.</p>
				</div>
			</header>
			<div class="table-container">
				<table class="table">
					<thead>
						<tr>
							<th>Data</th>
							<th>Motivo / Descrição</th>
							<th>Nível</th>
							<th>Estado</th>
							<th>Ações</th>
						</tr>
					</thead>
					<tbody id="table-body">
						<tr>
							<td colspan="5" class="color-muted text-center">A carregar dados...</td>
						</tr>
					</tbody>
				</table>
			</div>
		</main>
		<div id="modal" class="modal">
			<div class="card modal-card max-w-450">
				<div class="modal-header">
					<h2 class="text-lg text-bold color-dark">Tratar Alerta</h2>
					<button type="button" id="close-modal" class="close-btn">&times;</button>
				</div>
				<form id="modal-form">
					<div class="input-group">
						<label>Ação a Tomar</label>
						<select id="estadoAcao" class="form-control" required>
							<option value="Resolvido">Marcar como Resolvido</option>
							<option value="Ignorado">Ignorar Alerta</option>
						</select>
					</div>
					<div class="input-group d-none" id="justificacao-group">
						<label>Justificação (Obrigatória se ignorar)</label>
						<textarea id="justificacao" class="form-control" rows="3"></textarea>
					</div>
					<div class="form-actions"><button type="submit" class="btn btn-primary w-full">Guardar Decisão</button></div>
				</form>
			</div>
		</div>
		<script type="module" src="/js/service-worker-register.js"></script>
		<script type="module" src="/js/components/sidebar.js"></script>
		<script type="module" src="alertas.js"></script>
	</body>
</html>
