<!DOCTYPE html>
<html lang="pt-PT">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>GREENHERB - Início</title>
		<link rel="stylesheet" href="/shared/style.css">
		<link rel="stylesheet" href="/home.css">
		<script src="/shared/auth.js"></script>
		<script src="/shared/components.js" defer></script>
	</head>
	<body>
		<app-header title="GREENHERB: Gestão de Estufa"></app-header>
		<main>
			<section class="dashboard-stats">
				<h2>Visão Geral</h2>
				<div class="stats-grid">
					<div class="stat-card" id="stat-alertas">
						<div class="stat-icon">🚨</div>
						<div class="stat-info">
							<h3>Alertas Pendentes</h3>
							<p class="stat-value" id="val-alertas">--</p>
						</div>
					</div>
					<div class="stat-card" id="stat-lotes-ativos">
						<div class="stat-icon">🌱</div>
						<div class="stat-info">
							<h3>Lotes Ativos</h3>
							<p class="stat-value" id="val-lotes">--</p>
						</div>
					</div>
					<div class="stat-card" id="stat-plantas">
						<div class="stat-icon">🌿</div>
						<div class="stat-info">
							<h3>Plantas em Catálogo</h3>
							<p class="stat-value" id="val-plantas">--</p>
						</div>
					</div>
					<div class="stat-card" id="stat-tarefas">
						<div class="stat-icon">🚜</div>
						<div class="stat-info">
							<h3>Tarefas Registadas</h3>
							<p class="stat-value" id="val-tarefas">--</p>
						</div>
					</div>
				</div>
			</section>
			<section>
				<h2>Acesso Rápido</h2>
				<div class="dash-grid">
					<a href="/ervas/" class="card c-ervas">🌿<h3>Ervas</h3></a>
					<a href="/planos/" class="card c-planos">📋<h3>Planos</h3></a>
					<a href="/lotes/" class="card c-lotes">🌱<h3>Lotes</h3></a>
					<a href="/tarefas/" class="card c-tarefas">🚜<h3>Tarefas</h3></a>
					<a href="/medicoes/" class="card c-medicoes">🌡️<h3>Medições</h3></a>
				</div>
			</section>
		</main>
		<app-footer></app-footer>
		<script src="/shared/database.js" defer></script>
		<script src="/home.js" defer></script>
		<script src="/shared/service-worker-register.js" defer></script>
	</body>
</html>
